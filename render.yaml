services:
  - type: web
    name: bugbounty-ru-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: https://iyiceriv43-ops.github.io
      - key: DATABASE_URL
        fromDatabase:
          name: bugbounty-db
          property: connectionString
      - key: DATABASE_URL_SYNC
        fromDatabase:
          name: bugbounty-db
          property: connectionString

databases:
  - name: bugbounty-db
    plan: free
    ipAllowList: []
